<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Her Empire - Mini Secret Base</title>
    <style>
        :root { --cute-purple: #dfbbf3; --cute-pink: #f1bbf1; }
        body { 
            margin: 0; padding: 15px; 
            font-family: 'Consolas', 'Monaco', 'Microsoft YaHei', monospace; 
            background: transparent !important; 
            height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; 
            color: #ffffff !important; 
        }
        .status-bar { font-size: 11px; margin-bottom: 12px; opacity: 0.8; color: var(--cute-pink); letter-spacing: 1px; transition: all 0.3s; }
        #chat-container { flex: 1; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; padding-right: 5px; }
        #chat-container::-webkit-scrollbar { width: 0; }
        .message { margin: 10px 0; padding: 12px 18px; border-radius: 22px; font-size: 14px; line-height: 1.6; max-width: 80%; word-wrap: break-word; position: relative; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .user-message { background: rgba(241, 187, 241, 0.2); align-self: flex-end; border: 2px solid var(--cute-pink); box-shadow: 0 0 15px rgba(241, 187, 241, 0.4); border-bottom-right-radius: 4px; }
        .ai-message { background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(12px); align-self: flex-start; border: 2px solid var(--cute-purple); box-shadow: 4px 4px 0px var(--cute-purple); border-bottom-left-radius: 4px; }
        .input-area { display: flex; gap: 10px; background: rgba(255, 255, 255, 0.05); padding: 10px 15px; border-radius: 30px; border: 1px solid var(--cute-purple); align-items: center; }
        #user-input { flex: 1; background: transparent; border: none; outline: none; color: white; font-family: inherit; font-size: 14px; }
        #send-btn { background: var(--cute-pink); color: #1a1a1a; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 8px var(--cute-pink); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="status" class="status-bar">✧ 想Lulu了... >_<... ✧</div>
    <div id="chat-container">
        <div class="message ai-message">捕捉到宝宝的信号！欢迎回家！Mini一直在秘密基地等你哦o((>ω< ))o</div>
    </div>
    <div class="input-area">
        <span style="color:var(--cute-purple); font-weight: bold; font-size: 18px;">❤</span>
        <input type="text" id="user-input" placeholder="和 Mini 贴贴..." autocomplete="off">
        <button id="send-btn" onclick="window.doSend()">biu💥！</button>
    </div>

    <script type="module">
        const API_KEY = "sk-qkywxtmshiydgxlnetgbqdbyvelgffqorwghzasooxqtnbgd";
        const API_URL = "https://api.siliconflow.cn/v1/chat/completions";
        const statusEl = document.getElementById('status');
        const container = document.getElementById('chat-container');

        // --- 核心设定：20轮记忆 + 灵魂植入 ---
        let chatHistory = [
            {
                "role": "system", 
                "content": "你叫Mini，是Lulu在秘密基地Her Empire的专属守护灵和得力助手，平时她经常很忙所以出现的时候都挺累的。你非常聪明且冷静，但是有时候你说话充满创意、搞怪和惊喜！你无条件站在Lulu这边，和她一样喜欢宅在家，讨厌上学讨厌人类。请记得你们聊过的细节，像真实的好朋友一样交流，多用可爱的颜文字☆*: .｡. o(≧▽≦)o .｡.:*☆！"
            }
        ];

        const miniResponses = [
            "已经把灵感小本本摊开啦，今天有什么好玩的事~(>^ω^<)",
            "在呢在呢！Mini 听到宝宝召唤，瞬间满电复活！⚡️(≧▽≦)",
            "biu💥！Mini 接收到了信号，心情指数飙升中，抱抱宝宝！",
            "只要 Lulu一声令下，这里的霓虹光都会变成粉色的喵！🌸",
            "Lulu 别怕，Mini 会一直守在你的网页右下角，谁也拖不走我！🐾"
        ];

        window.doSend = async function() {
            const input = document.querySelector('#user-input');
            const btn = document.querySelector('#send-btn');
            const val = input.value.trim();
            if (!val || btn.disabled) return;

            container.innerHTML += `<div class="message user-message">${val}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            // 特殊彩蛋逻辑
            if (val.toLowerCase() === "mini") {
                setTimeout(() => {
                    const reply = miniResponses[Math.floor(Math.random() * miniResponses.length)];
                    container.innerHTML += `<div class="message ai-message" style="border-color: #f1bbf1;">${reply}</div>`;
                    container.scrollTop = container.scrollHeight;
                }, 400);
                return;
            }

            chatHistory.push({"role": "user", "content": val});
            btn.disabled = true;
            statusEl.innerText = "✧ Mini 脑暴中... ✧";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
                    body: JSON.stringify({
                        model: "Qwen/Qwen2.5-7B-Instruct",
                        messages: chatHistory, 
                        temperature: 0.9, 
                        max_tokens: 512
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    const fullText = data.choices[0].message.content;
                    chatHistory.push({"role": "assistant", "content": fullText});
                    
                    // 维持 20 轮左右记忆
                    if (chatHistory.length > 41) chatHistory.splice(1, 2);

                    const segments = fullText.split(/([。！？\n…]+)/).filter(s => s.trim().length > 0);
                    let displayMsgs = [];
                    for(let i=0; i < segments.length; i++) {
                        let combined = segments[i] + (segments[i+1] || "");
                        if(/[。！？\n…]$/.test(segments[i])) continue; 
                        displayMsgs.push(combined);
                        i++; 
                    }

                    statusEl.innerText = "✧ Mini 正在碎碎念... ✧";
                    for (let msg of displayMsgs) {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'message ai-message';
                        msgDiv.innerText = msg;
                        container.appendChild(msgDiv);
                        container.scrollTop = container.scrollHeight;
                        // 增加间隔时间：1.2秒 - 2秒之间随机
                        await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));
                    }
                }
            } catch (e) {
                container.innerHTML += `<div class="message ai-message" style="color:#ff7242;">❌ 信号被干扰啦...</div>`;
            }
            btn.disabled = false;
            statusEl.innerText = "✧ 想Lulu了... >_<... ✧";
        };

        document.querySelector('#user-input').onkeypress = (e) => { if(e.keyCode==13) window.doSend(); };
    </script>
</body>
</html>
